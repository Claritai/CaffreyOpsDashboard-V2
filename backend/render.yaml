# Render blueprint for the Caffrey Ops Dashboard.
# Single web service: Node serves both the API and the static frontend.
# Commit this file, then in Render: New + → Blueprint → pick this repo.
services:
  - type: web
    name: caffrey-ops
    runtime: node
    plan: starter          # 'free' works but spins down when idle; 'starter' keeps it warm
    rootDir: backend        # build + start run from backend/
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /       # returns index.html (200) once booted
    # A persistent disk so sessions.db + hypercare.db survive deploys/restarts.
    # Without it the filesystem is wiped on every deploy → everyone re-logs in
    # and hypercare history is lost. Requires a paid instance type.
    disk:
      name: caffrey-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Secrets — set these in the Render dashboard (sync:false = not in repo).
      - key: SESSION_SECRET
        sync: false
      - key: DB_ENCRYPTION_KEY      # exactly 64 hex chars — see RENDER.md
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      # Must equal https://<your-service>.onrender.com/api/auth/callback
      - key: AZURE_REDIRECT_URI
        sync: false
      - key: ALLOWED_USERS
        sync: false
      - key: INBOX_OPERATIONS
        sync: false
      - key: INBOX_EXPORT
        sync: false
      - key: INBOX_IRELAND
        sync: false
      - key: INBOX_UK
        sync: false
      - key: INBOX_EU
        sync: false
      - key: INBOX_OFFERS
        sync: false
      - key: PRIORITY_CLIENTS
        sync: false
      # Optional hypercare alert channels — leave unset to disable.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TEAMS_WEBHOOK_URL
        sync: false
